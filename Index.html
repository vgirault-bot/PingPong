<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05080a">
<title>PONG · Néon Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05080a;
    --neon: #00ff9c;
    --neon-glow: #00ff9c66;
    --magenta: #ff3eb5;
    --magenta-glow: #ff3eb566;
    --cyan: #33ffee;
    --gold: #ffd700;
    --danger: #ff3860;
    --text: #d8ffe9;
    --muted: #4a6b5a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'VT323',monospace;overflow:hidden;user-select:none;-webkit-user-select:none;overscroll-behavior:none;}
  body{touch-action:none;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 1px,transparent 1px 3px),radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%);z-index:100;mix-blend-mode:multiply;}

  .stage{height:100vh;height:100dvh;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}

  .header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 20px 6px;gap:12px;flex-shrink:0;}
  .score-block{display:flex;flex-direction:column;align-items:center;}
  .score-block.right{align-items:center;}
  .score-num{font-size:42px;line-height:1;font-variant-numeric:tabular-nums;}
  .score-block.player .score-num{color:var(--neon);text-shadow:0 0 12px var(--neon-glow);}
  .score-block.ai .score-num{color:var(--magenta);text-shadow:0 0 12px var(--magenta-glow);}
  .score-label{font-size:11px;letter-spacing:0.4em;color:var(--muted);text-transform:uppercase;}
  .vs{text-align:center;}
  .vs-text{font-family:'Major Mono Display',monospace;font-size:16px;letter-spacing:0.3em;background:linear-gradient(90deg,var(--neon),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .match-info{display:block;font-size:11px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-top:2px;}

  .arena-wrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;}
  .arena{position:relative;border:2px solid;border-image:linear-gradient(180deg,var(--magenta),var(--neon)) 1;box-shadow:0 0 0 3px var(--bg),0 0 25px rgba(0,255,156,0.15),0 0 25px rgba(255,62,181,0.15);background:#0a1014;touch-action:none;}
  canvas{display:block;image-rendering:pixelated;touch-action:none;}

  .overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,8,10,0.92);backdrop-filter:blur(6px);text-align:center;padding:20px;z-index:10;pointer-events:none;}
  .overlay.visible{display:flex;pointer-events:auto;}
  .overlay-title{font-family:'Major Mono Display',monospace;font-size:24px;letter-spacing:0.25em;margin-bottom:10px;animation:pulse 1.6s ease-in-out infinite;}
  .overlay.win .overlay-title{color:var(--neon);text-shadow:0 0 14px var(--neon-glow);}
  .overlay.lose .overlay-title{color:var(--magenta);text-shadow:0 0 14px var(--magenta-glow);}
  .overlay.start .overlay-title{background:linear-gradient(90deg,var(--neon),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .overlay-text{font-size:16px;color:var(--text);margin-bottom:4px;}
  .overlay-hint{font-size:13px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-top:18px;animation:blink 1s step-end infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
  @keyframes blink{50%{opacity:0.3;}}

  .mode-row{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 16px 4px;flex-shrink:0;}
  .mode-btn{background:transparent;border:none;color:var(--muted);font-family:'VT323',monospace;font-size:15px;letter-spacing:0.25em;text-transform:uppercase;padding:4px 6px;cursor:pointer;touch-action:manipulation;}
  .mode-btn.active{color:var(--neon);text-shadow:0 0 8px var(--neon-glow);}
  .mode-sep{color:var(--muted);opacity:0.4;font-size:14px;}

  .btn-row{display:flex;gap:12px;padding:4px 40px 14px;flex-shrink:0;}
  .ctrl-btn{flex:1;height:42px;border:1px solid var(--neon-dim,#00b870);background:rgba(0,255,156,0.04);color:var(--neon);font-family:'VT323',monospace;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;border-radius:8px;touch-action:none;transition:all 0.08s;}
  .ctrl-btn:active{background:rgba(0,255,156,0.25);box-shadow:inset 0 0 14px var(--neon-glow);}

  .hint{text-align:center;font-size:11px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;padding:2px 16px 2px;flex-shrink:0;}

  @media(max-height:700px){
    .score-num{font-size:34px;}
    .header{padding:6px 16px 4px;}
  }
</style>
</head>
<body>
<div class="stage">
  <header class="header">
    <div class="score-block player">
      <span class="score-num" id="playerScore">0</span>
      <span class="score-label">Toi</span>
    </div>
    <div class="vs">
      <span class="vs-text">pong</span>
      <span class="match-info" id="matchInfo">Premier à 7</span>
    </div>
    <div class="score-block ai">
      <span class="score-num" id="aiScore">0</span>
      <span class="score-label">IA</span>
    </div>
  </header>

  <main class="arena-wrap">
    <div class="arena" id="arena">
      <canvas id="game"></canvas>
      <div class="overlay visible start" id="overlay">
        <div class="overlay-title" id="ovTitle">Pong</div>
        <div class="overlay-text" id="ovText">Glisse le doigt pour bouger</div>
        <div class="overlay-hint" id="ovHint">Touche pour démarrer</div>
      </div>
    </div>
  </main>

  <p class="hint">Glisse sur l'écran pour déplacer ta raquette</p>

  <div class="mode-row">
    <button class="mode-btn active" data-mode="easy" type="button">Facile</button>
    <span class="mode-sep">·</span>
    <button class="mode-btn" data-mode="normal" type="button">Normal</button>
    <span class="mode-sep">·</span>
    <button class="mode-btn" data-mode="hard" type="button">Rapide</button>
  </div>

  <div class="btn-row">
    <button class="ctrl-btn" id="pauseBtn" type="button">Pause</button>
    <button class="ctrl-btn" id="resetBtn" type="button">Reset</button>
  </div>
</div>

<script>
(()=>{
  const canvas=document.getElementById('game');
  const ctx=canvas.getContext('2d');
  const arena=document.getElementById('arena');
  const overlay=document.getElementById('overlay');
  const ovTitle=document.getElementById('ovTitle');
  const ovText=document.getElementById('ovText');
  const ovHint=document.getElementById('ovHint');
  const playerScoreEl=document.getElementById('playerScore');
  const aiScoreEl=document.getElementById('aiScore');
  const matchInfoEl=document.getElementById('matchInfo');

  // === CONFIG ===
  const WIN_SCORE=7;
  const PADDLE_W_RATIO=0.22;
  const PADDLE_H=12;
  const PADDLE_MARGIN=0.06;
  const BALL_R_RATIO=0.018;
  const BALL_BASE_SPEED=0.006;
  const SPEED_INC=1.04;
  const MAX_ANGLE=Math.PI/3.2;

  const AI_CFG={
    easy:  {speed:0.28,error:50,react:0.6},
    normal:{speed:0.48,error:25,react:0.8},
    hard:  {speed:0.72,error:10,react:0.95},
  };

  let difficulty='easy';
  try{const s=localStorage.getItem('pong_mode');if(s&&AI_CFG[s])difficulty=s;}catch(e){}

  let W,H,paddleW,ballR,marginTop,marginBot;
  let playerX,aiX,ball;
  let pScore,aScore,particles,popups,trail;
  let state,serveTo,rallyCount;
  let shakeT,shakeI,goalFlash;
  let paused,lastTime,pauseStart;
  let aiTargetX,aiErrorX;

  // === AUDIO ===
  let audioCtx=null;
  function ensureAudio(){
    if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
  }
  function beep(f,d,t='square',v=0.04,w=0){
    if(!audioCtx)return;
    try{const t0=audioCtx.currentTime+w;const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=t;o.frequency.setValueAtTime(f,t0);g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
    o.connect(g);g.connect(audioCtx.destination);o.start(t0);o.stop(t0+d);}catch(e){}
  }
  function sndHit(){beep(600,0.04);beep(900,0.03,'square',0.03,0.02);}
  function sndWall(){beep(400,0.03,'triangle',0.02);}
  function sndGoalP(){[800,1000,1200,1500].forEach((f,i)=>beep(f,0.08,'square',0.05,i*0.06));}
  function sndGoalA(){[500,400,300,200].forEach((f,i)=>beep(f,0.10,'sawtooth',0.05,i*0.07));}
  function sndWin(){[600,800,1000,1200,1500,1800].forEach((f,i)=>beep(f,0.12,'square',0.06,i*0.08));}
  function sndLose(){[400,350,300,250,200,150].forEach((f,i)=>beep(f,0.15,'sawtooth',0.06,i*0.1));}

  // === SIZING ===
  function fitCanvas(){
    const wrap=document.querySelector('.arena-wrap');
    const maxW=wrap.clientWidth-12,maxH=wrap.clientHeight-12;
    const ratio=0.65;
    let w,h;
    if(maxW*1/ratio<=maxH){w=maxW;h=Math.floor(w/ratio);}
    else{h=maxH;w=Math.floor(h*ratio);}
    W=w;H=h;
    canvas.width=W;canvas.height=H;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    paddleW=W*PADDLE_W_RATIO;
    ballR=Math.max(6,W*BALL_R_RATIO);
    marginTop=H*PADDLE_MARGIN+PADDLE_H/2;
    marginBot=H*(1-PADDLE_MARGIN)-PADDLE_H/2;
    draw();
  }

  // === GAME STATE ===
  function resetMatch(){
    pScore=0;aScore=0;
    particles=[];popups=[];trail=[];
    shakeT=0;shakeI=0;goalFlash=0;
    paused=false;
    rallyCount=0;
    aiTargetX=W/2;aiErrorX=0;
    playerX=W/2;aiX=W/2;
    serveTo='player';
    updateScoreUI();
    serveBall();
    state='ready';
    showOv('start','Pong','Glisse le doigt pour bouger','Touche pour démarrer');
  }

  function serveBall(){
    const angle=(Math.random()-0.5)*0.6;
    const spd=BALL_BASE_SPEED*H;
    const dir=serveTo==='player'?1:-1;
    ball={x:W/2,y:H/2,vx:Math.sin(angle)*spd,vy:Math.cos(angle)*spd*dir};
    rallyCount=0;
    aiErrorX=(Math.random()-0.5)*AI_CFG[difficulty].error;
  }

  function updateScoreUI(){
    playerScoreEl.textContent=pScore;
    aiScoreEl.textContent=aScore;
    matchInfoEl.textContent=`Premier à ${WIN_SCORE}`;
  }

  function showOv(cls,title,text,hint){
    overlay.className='overlay visible '+cls;
    ovTitle.textContent=title;ovText.textContent=text||'';ovHint.textContent=hint||'';
  }
  function hideOv(){overlay.classList.remove('visible');}

  // === PHYSICS ===
  function update(){
    if(state!=='playing'||paused)return;

    // ball movement
    ball.x+=ball.vx;
    ball.y+=ball.vy;

    // wall bounce
    if(ball.x-ballR<=0){ball.x=ballR;ball.vx=Math.abs(ball.vx);sndWall();sparkAt(ball.x,ball.y,'0,255,156');}
    if(ball.x+ballR>=W){ball.x=W-ballR;ball.vx=-Math.abs(ball.vx);sndWall();sparkAt(ball.x,ball.y,'0,255,156');}

    // player paddle (bottom)
    if(ball.vy>0&&ball.y+ballR>=marginBot-PADDLE_H/2&&ball.y-ballR<marginBot+PADDLE_H/2){
      if(ball.x>=playerX-paddleW/2-ballR&&ball.x<=playerX+paddleW/2+ballR){
        bouncePaddle(playerX,marginBot,-1);
      }
    }
    // AI paddle (top)
    if(ball.vy<0&&ball.y-ballR<=marginTop+PADDLE_H/2&&ball.y+ballR>marginTop-PADDLE_H/2){
      if(ball.x>=aiX-paddleW/2-ballR&&ball.x<=aiX+paddleW/2+ballR){
        bouncePaddle(aiX,marginTop,1);
      }
    }

    // goals
    if(ball.y>H+ballR*2){goal('player');}
    if(ball.y<-ballR*2){goal('ai');}

    // AI
    updateAI();

    // trail
    trail.push({x:ball.x,y:ball.y,life:16,max:16});
    if(trail.length>30)trail.shift();

    // goal flash
    if(goalFlash>0)goalFlash-=0.03;
  }

  function bouncePaddle(px,py,dirY){
    const hitPos=Math.max(-1,Math.min(1,(ball.x-px)/(paddleW/2)));
    const angle=hitPos*MAX_ANGLE;
    const curSpeed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    const newSpeed=Math.min(curSpeed*SPEED_INC,H*0.025);
    ball.vx=newSpeed*Math.sin(angle);
    ball.vy=newSpeed*Math.cos(angle)*dirY;
    ball.y=py+dirY*(PADDLE_H/2+ballR);
    rallyCount++;
    sndHit();
    sparkAt(ball.x,py,dirY<0?'0,255,156':'255,62,181');
    aiErrorX=(Math.random()-0.5)*AI_CFG[difficulty].error;
    if(navigator.vibrate)try{navigator.vibrate(8);}catch(e){}
  }

  function goal(scorer){
    state='goal';
    if(scorer==='player'){pScore++;sndGoalP();goalFlash=1;}
    else{aScore++;sndGoalA();goalFlash=-1;}
    updateScoreUI();

    // explosion
    const gx=ball.x,gy=scorer==='player'?0:H;
    const col=scorer==='player'?'0,255,156':'255,62,181';
    for(let i=0;i<40;i++){
      particles.push({x:gx,y:gy,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*6*(scorer==='player'?1:-1),
        life:40,max:40,color:col});
    }
    shakeT=20;shakeI=8;
    if(navigator.vibrate)try{navigator.vibrate([40,30,60]);}catch(e){}

    serveTo=scorer==='player'?'ai':'player';

    if(pScore>=WIN_SCORE){
      state='over';sndWin();
      showOv('win','Victoire !',`${pScore} - ${aScore}`,'Touche pour rejouer');
      return;
    }
    if(aScore>=WIN_SCORE){
      state='over';sndLose();
      showOv('lose','Défaite',`${pScore} - ${aScore}`,'Touche pour rejouer');
      return;
    }

    setTimeout(()=>{
      if(state==='goal'){serveBall();state='playing';}
    },1200);
  }

  function updateAI(){
    const cfg=AI_CFG[difficulty];
    let targetX=W/2;

    if(ball.vy<0){
      // predict landing X
      const tRem=(marginTop-ball.y)/(-ball.vy);
      let px=ball.x+ball.vx*tRem;
      // simple wall bounce prediction
      while(px<0||px>W){
        if(px<0)px=-px;
        if(px>W)px=2*W-px;
      }
      targetX=px+aiErrorX;
    } else {
      targetX=W/2+(Math.random()-0.5)*30;
    }

    const maxMove=cfg.speed*W/60;
    const lerp=cfg.react;
    aiTargetX=aiTargetX*(1-lerp)+targetX*lerp;
    const diff=aiTargetX-aiX;
    if(Math.abs(diff)>1){
      aiX+=Math.sign(diff)*Math.min(Math.abs(diff),maxMove);
    }
    aiX=Math.max(paddleW/2,Math.min(W-paddleW/2,aiX));
  }

  function sparkAt(x,y,color){
    for(let i=0;i<10;i++){
      particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:18,max:18,color});
    }
  }

  // === RENDU ===
  function draw(){
    const now=performance.now();
    ctx.save();
    if(shakeT>0){ctx.translate((Math.random()-0.5)*shakeI,(Math.random()-0.5)*shakeI);shakeT--;shakeI*=0.9;}

    // fond
    ctx.fillStyle='#0a1014';
    ctx.fillRect(0,0,W,H);

    // goal flash
    if(goalFlash>0){
      const g=ctx.createLinearGradient(0,H,0,H*0.6);
      g.addColorStop(0,`rgba(0,255,156,${goalFlash*0.15})`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }
    if(goalFlash<0){
      const g=ctx.createLinearGradient(0,0,0,H*0.4);
      g.addColorStop(0,`rgba(255,62,181,${-goalFlash*0.15})`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }

    // grille subtile
    ctx.strokeStyle='rgba(255,255,255,0.02)';
    ctx.lineWidth=1;
    for(let x=0;x<=W;x+=Math.round(W/12)){ctx.beginPath();ctx.moveTo(x+0.5,0);ctx.lineTo(x+0.5,H);ctx.stroke();}

    // ligne centrale
    ctx.setLineDash([8,8]);
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    ctx.setLineDash([]);

    // trail
    for(let i=0;i<trail.length;i++){
      const t=trail[i];t.life--;
      const a=t.life/t.max*0.3;
      const r=ballR*(t.life/t.max);
      ctx.fillStyle=`rgba(51,255,238,${a})`;
      ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();
    }
    trail=trail.filter(t=>t.life>0);

    // ball
    if(state==='playing'||state==='ready'||state==='goal'){
      const speed=Math.sqrt((ball.vx||0)**2+(ball.vy||0)**2);
      const glow=Math.min(20+speed*60,40);
      ctx.shadowBlur=glow;ctx.shadowColor='#33ffee';
      ctx.fillStyle='#eeffff';
      ctx.beginPath();ctx.arc(ball.x,ball.y,ballR,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=glow*0.5;ctx.shadowColor='#ffffff';
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(ball.x-ballR*0.2,ball.y-ballR*0.2,ballR*0.4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }

    // raquettes
    drawPaddle(playerX,marginBot,'#00ff9c','rgba(0,255,156,0.5)',20);
    drawPaddle(aiX,marginTop,'#ff3eb5','rgba(255,62,181,0.5)',16);

    // particules
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life--;
      const a=p.life/p.max;
      ctx.fillStyle=`rgba(${p.color},${a})`;
      ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
      if(p.life<=0)particles.splice(i,1);
    }

    // popups
    ctx.textAlign='center';
    for(let i=popups.length-1;i>=0;i--){
      const p=popups[i];p.y+=p.vy;p.vy*=0.95;p.life--;
      const a=Math.min(1,p.life/20);
      ctx.font=`bold ${p.size}px 'VT323',monospace`;
      ctx.shadowBlur=8;ctx.shadowColor=p.color;ctx.fillStyle=p.color.replace('1)',`${a})`);
      ctx.fillText(p.text,p.x,p.y);ctx.shadowBlur=0;
      if(p.life<=0)popups.splice(i,1);
    }

    // rally counter
    if(state==='playing'&&rallyCount>=4){
      ctx.font="bold 14px 'VT323',monospace";
      ctx.fillStyle=`rgba(51,255,238,${0.3+Math.sin(now/200)*0.15})`;
      ctx.textAlign='right';
      ctx.fillText('Rally '+rallyCount,W-10,H/2+5);
    }

    ctx.restore();
  }

  function drawPaddle(px,py,color,glow,blur){
    ctx.shadowBlur=blur;ctx.shadowColor=glow;
    ctx.fillStyle=color;
    const x=px-paddleW/2,y=py-PADDLE_H/2;
    ctx.beginPath();
    ctx.moveTo(x+4,y);ctx.lineTo(x+paddleW-4,y);
    ctx.quadraticCurveTo(x+paddleW,y,x+paddleW,y+4);
    ctx.lineTo(x+paddleW,y+PADDLE_H-4);
    ctx.quadraticCurveTo(x+paddleW,y+PADDLE_H,x+paddleW-4,y+PADDLE_H);
    ctx.lineTo(x+4,y+PADDLE_H);
    ctx.quadraticCurveTo(x,y+PADDLE_H,x,y+PADDLE_H-4);
    ctx.lineTo(x,y+4);
    ctx.quadraticCurveTo(x,y,x+4,y);
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillRect(px-paddleW*0.35,py-PADDLE_H/2+2,paddleW*0.7,3);
  }

  // === LOOP ===
  function loop(now){
    if(!lastTime)lastTime=now;
    const dt=Math.min(now-lastTime,50);
    lastTime=now;
    if(!paused){
      const steps=Math.max(1,Math.round(dt/16));
      for(let i=0;i<steps;i++)update();
    }
    draw();
    requestAnimationFrame(loop);
  }

  // === INPUT ===
  let touching=false;

  function movePlayerTo(clientX){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)/rect.width*W;
    playerX=Math.max(paddleW/2,Math.min(W-paddleW/2,x));
  }

  document.addEventListener('pointerdown',e=>{
    ensureAudio();
    if(state==='ready'){state='playing';hideOv();return;}
    if(state==='over'){resetMatch();return;}
    if(paused){paused=false;hideOv();return;}
    touching=true;
    movePlayerTo(e.clientX);
  });
  document.addEventListener('pointermove',e=>{
    if(e.cancelable)e.preventDefault();
    if(state==='playing'&&!paused){movePlayerTo(e.clientX);}
  });
  document.addEventListener('pointerup',()=>{touching=false;});

  // empêcher scroll / zoom
  document.addEventListener('touchmove',e=>{if(e.cancelable)e.preventDefault();},{passive:false});
  let lastTouchEnd=0;
  document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouchEnd<=300&&e.cancelable)e.preventDefault();lastTouchEnd=n;},{passive:false});
  document.addEventListener('gesturestart',e=>e.preventDefault());

  // boutons
  function bindBtn(id,fn){
    const b=document.getElementById(id);
    const h=e=>{e.preventDefault();e.stopPropagation();ensureAudio();fn();};
    b.addEventListener('pointerdown',h);b.addEventListener('touchstart',h,{passive:false});
  }
  bindBtn('pauseBtn',()=>{
    if(state!=='playing')return;
    paused=!paused;
    if(paused)showOv('start','Pause','','Touche pour reprendre');
    else hideOv();
  });
  bindBtn('resetBtn',resetMatch);

  // modes
  function updateModeButtons(){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===difficulty));}
  updateModeButtons();
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.preventDefault();e.stopPropagation();
      difficulty=btn.dataset.mode;
      try{localStorage.setItem('pong_mode',difficulty);}catch(e){}
      updateModeButtons();
      aiErrorX=(Math.random()-0.5)*AI_CFG[difficulty].error;
    });
  });

  // clavier
  let keysDown={};
  document.addEventListener('keydown',e=>{
    keysDown[e.code]=true;
    if(e.code==='Space'){e.preventDefault();ensureAudio();
      if(state==='ready'){state='playing';hideOv();}
      else if(state==='over')resetMatch();
      else if(state==='playing'){paused=!paused;if(paused)showOv('start','Pause','','Espace pour reprendre');else hideOv();}
    }
    if(e.code==='KeyR'){e.preventDefault();resetMatch();}
  });
  document.addEventListener('keyup',e=>{keysDown[e.code]=false;});
  // keyboard paddle control
  setInterval(()=>{
    if(state==='playing'&&!paused){
      if(keysDown['ArrowLeft']||keysDown['KeyQ']||keysDown['KeyA'])playerX=Math.max(paddleW/2,playerX-W*0.015);
      if(keysDown['ArrowRight']||keysDown['KeyD'])playerX=Math.min(W-paddleW/2,playerX+W*0.015);
    }
  },16);

  // === RESIZE ===
  if(window.ResizeObserver){const ro=new ResizeObserver(fitCanvas);ro.observe(document.querySelector('.arena-wrap'));}
  window.addEventListener('resize',fitCanvas);
  window.addEventListener('orientationchange',()=>setTimeout(fitCanvas,200));
  requestAnimationFrame(()=>{fitCanvas();requestAnimationFrame(fitCanvas);});

  resetMatch();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
